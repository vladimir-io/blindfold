version: '3.8'

services:
  gateway:
    build: .
    container_name: blindfold-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - PRIVACY_MODEL=openai/pii-1.5b
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - blindfold-net

  redis:
    image: redis:7-alpine
    container_name: blindfold-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - blindfold-net

networks:
  blindfold-net:
    driver: bridge
